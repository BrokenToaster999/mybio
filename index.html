<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Bio Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

body{
    position:relative;
    background:#dddddd;
}

/* animated gray pattern */
body::before{
    content:"";
    position:absolute;
    inset:-200px;

    background:
        repeating-linear-gradient(
            -45deg,
            rgba(255,255,255,0.06) 0px,
            rgba(255,255,255,0.06) 12px,
            transparent 12px,
            transparent 40px
        );

    animation:bgMove 14s linear infinite;
}

/* ========================= */
/* MAIN WRAPPER */
/* ========================= */

.wrapper{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* ========================= */
/* GREEN PANEL */
/* ========================= */

.green-panel{
    position:absolute;

    width:160%;
    height:100%;

    left:-20%;
    bottom:-48%;

    transform:rotate(-20deg);

    background:#63d85e;

    box-shadow:
        0 0 80px rgba(0,0,0,0.25),
        inset 0 0 40px rgba(255,255,255,0.08);

    overflow:hidden;

    z-index:5;
}

/* animated pattern */
.green-panel::before{
    content:"";

    position:absolute;
    inset:-300px;

    background:
        repeating-linear-gradient(
            45deg,
            rgba(255,255,255,0.08) 0px,
            rgba(255,255,255,0.08) 12px,
            transparent 12px,
            transparent 50px
        );

    animation:greenMove 12s linear infinite;
}

/* subtle vignette */
.green-panel::after{
    content:"";

    position:absolute;
    inset:0;

    background:
        radial-gradient(circle at center,
        transparent 20%,
        rgba(0,0,0,0.08) 100%);
}

/* ========================= */
/* CHARACTERS */
/* ========================= */

.toaster{
    position:absolute;

    width:30vw;

    top:4%;
    left:2%;

    z-index:2;

    filter:
        drop-shadow(0 15px 25px rgba(0,0,0,0.35));

    animation:float1 5s ease-in-out infinite;
}

/* partially hidden behind green */
.felix{
    position:absolute;

    width:33vw;

    right:4%;
    bottom:-5%;

    z-index:7;

    filter:
        drop-shadow(0 15px 30px rgba(0,0,0,0.4));

    animation:float2 6s ease-in-out infinite;
}

/* ========================= */
/* SOCIALS */
/* ========================= */

.social{
    position:absolute;

    display:flex;
    align-items:center;
    gap:1rem;

    text-decoration:none;

    color:white;

    transform:rotate(-20deg);

    text-shadow:
        0 4px 12px rgba(0,0,0,0.45);

    transition:0.2s;
}

.social:hover{
    transform:
        rotate(-20deg)
        scale(1.05)
        translateX(10px);
}

.social img{
    width:clamp(36px, 3vw, 56px);
    height:clamp(36px, 3vw, 56px);

    border-radius:12px;

    box-shadow:
        0 6px 16px rgba(0,0,0,0.35);
}

.social span{
    font-size:clamp(18px, 2vw, 38px);
    font-weight:700;
}

/* public sona socials */
.discord{
    left:30%;
    top:15%;
    z-index:10;
}

.twitch{
    left:33%;
    top:24%;
    z-index:10;
}

.twitter{
    left:36%;
    top:33%;
    z-index:10;
}

.youtube{
    left:39%;
    top:42%;
    z-index:10;
}


/* furry socials */
.telegram{
    left:30%;
    bottom:27%;
    z-index:10;
}

.barq{
    left:33%;
    bottom:18%;
    z-index:10;
}

/* ========================= */
/* ANIMATIONS */
/* ========================= */

@keyframes bgMove{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(120px,120px);
    }
}

@keyframes greenMove{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(-120px,120px);
    }
}

@keyframes float1{
    0%{ transform:translateY(0px); }
    50%{ transform:translateY(-10px); }
    100%{ transform:translateY(0px); }
}

@keyframes float2{
    0%{ transform:translateY(0px); }
    50%{ transform:translateY(-16px); }
    100%{ transform:translateY(0px); }
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width: 900px){

    .green-panel{
        height:78%;
        bottom:-28%;
    }

    .toaster{
        width:42vw;
        left:-3%;
        top:6%;
    }

    .felix{
        width:55vw;
        right:-6%;
        bottom:6%;
    }

    .social{
        gap:0.6rem;
    }

    .twitter{
        left:25%;
        top:31%;
    }

    .youtube{
        left:29%;
        top:39%;
    }

    .telegram{
        left:12%;
        bottom:23%;
    }

    .barq{
        left:16%;
        bottom:15%;
    }

    .social span{
        font-size:clamp(14px, 4vw, 24px);
    }

}

</style>
</head>

<body>

<div class="wrapper">

    <!-- GREEN PANEL -->
    <div class="green-panel"></div>

    <!-- CHARACTERS -->
    <img src="toaster.png" class="toaster">
    <img src="felix.png" class="felix">

    <!-- PUBLIC -->
    <a class="social twitch" href="https://www.twitch.tv/brokentoaster999" target="_blank">
        <img src="logos/twitch.webp">
        <span>@brokentoaster999</span>
    </a>

    <a class="social twitter" href="https://www.x.com/BrokenToaster99" target="_blank">
        <img src="logos/x.jpg">
        <span>@BrokenToaster99</span>
    </a>

    <a class="social youtube" href="https://www.youtube.com/@brokentoaster999" target="_blank">
        <img src="logos/youtube.png">
        <span>@brokentoaster999</span>
    </a>

    <a class="social discord" href="https://discordapp.com/users/brokentoaster999" target="_blank">
        <img src="logos/discord.png">
        <span>@brokentoaster999</span>
    </a>

    <!-- FURRY -->
    <a class="social telegram" href="https://t.me/Artastic93" target="_blank">
        <img src="logos/telegram.png">
        <span>@Artastic93</span>
    </a>

    <a class="social barq" href="https://web.barq.app/profiles/935b8fbc-b29e-4786-9325-b5f81562edf9" target="_blank">
        <img src="logos/barq.svg">
        <span>@artastic57</span>
    </a>

</div>

</body>
</html>
